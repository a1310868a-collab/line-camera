<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE 拍照備份</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #FFF5F9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h2 { color: #D4607E; margin-bottom: 6px; font-size: 20px; }
    .subtitle { color: #999; font-size: 13px; margin-bottom: 20px; }
    .gps-box {
      background: #E8F8F0;
      border-radius: 12px;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #3A9A72;
      line-height: 1.8;
      white-space: pre-line;
    }
    .area-box {
      background: #FFF0C0;
      border-radius: 12px;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #A07800;
      line-height: 1.8;
      display: none;
      white-space: pre-line;
    }
    .debug-box {
      background: #F0F0F0;
      border-radius: 12px;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      font-size: 11px;
      color: #555;
      line-height: 1.6;
      white-space: pre-line;
      word-break: break-all;
      display: none;
    }
    .btn {
      width: 100%;
      max-width: 400px;
      padding: 14px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.75; }
    .btn-camera { background: #FFB5C8; color: #D4607E; }
    .btn-upload { background: #C7CEEA; color: #5A65B5; display: none; }
    .btn-end    { background: #FFDAC1; color: #D07030; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .preview-area {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .preview-item {
      width: calc(33% - 6px);
      position: relative;
    }
    .preview-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid #FFB5C8;
    }
    .preview-item .gps-tag {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.55);
      color: white;
      font-size: 9px;
      border-radius: 4px;
      padding: 2px 4px;
    }
    .count-badge {
      background: #FFB5C8;
      color: #D4607E;
      border-radius: 50px;
      padding: 5px 16px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 14px;
    }
    .progress-bar {
      width: 100%;
      max-width: 400px;
      background: #eee;
      border-radius: 50px;
      height: 10px;
      margin-bottom: 12px;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      background: #FFB5C8;
      height: 100%;
      border-radius: 50px;
      transition: width 0.3s;
      width: 0%;
    }
    .status {
      color: #888;
      font-size: 12px;
      margin-top: 6px;
      text-align: center;
      min-height: 18px;
      padding: 0 10px;
      white-space: pre-line;
    }
    #file-input { display: none; }
  </style>
</head>
<body>

<h2>📷 LINE 拍照備份</h2>
<p class="subtitle">照片將依 GPS 自動存入對應地區</p>

<div class="gps-box" id="gps-box">📡 正在讀取 GPS 座標...</div>
<div class="area-box" id="area-box"></div>
<div class="debug-box" id="debug-box"></div>

<div class="count-badge" id="count-badge">已拍 0 張</div>
<div class="preview-area" id="preview-area"></div>

<div class="progress-bar" id="progress-bar">
  <div class="progress-fill" id="progress-fill"></div>
</div>

<button class="btn btn-camera" id="btn-camera" onclick="openCamera()">📷 拍照 / 選取照片</button>
<button class="btn btn-upload" id="btn-upload" onclick="uploadAll()">⬆️ 上傳全部照片</button>
<button class="btn btn-end" id="btn-end" onclick="endSession()">⏹ 結束</button>

<input type="file" id="file-input" accept="image/*" capture="environment" multiple onchange="handleFiles(this.files)">

<p class="status" id="status">等待 GPS 讀取中...</p>

<script>
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbw-IIdB05JNcE6ltKy8YrTYQ17YhWMvt14UXn33mrFdIQf8LIYaf62VMI0wa04iBqGH/exec';
  var LIFF_ID = '2009652153-mnWgVOub';

  var photos = [];
  var photoLocations = [];
  var currentLocation = null;
  var sessionData = {};
  var uploadGroupCount = 0;

  function showDebug(msg) {
    var box = document.getElementById('debug-box');
    box.style.display = 'block';
    box.textContent = msg;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  async function initLiff() {
    try {
      setStatus('初始化 LIFF...');
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      var profile = await liff.getProfile();
      sessionData.userId = profile.userId;
      setStatus('已登入，正在讀取 GPS...');
      startWatchingLocation();
    } catch(err) {
      setStatus('初始化失敗：' + err.message);
      showDebug('LIFF 錯誤：' + err.toString());
    }
  }

  function startWatchingLocation() {
    if (!navigator.geolocation) {
      document.getElementById('gps-box').textContent = '⚠️ 此裝置不支援 GPS\n照片將存入「其他」資料夾';
      setStatus('無 GPS，仍可拍照');
      return;
    }
    navigator.geolocation.watchPosition(
      function(position) {
        currentLocation = {
          lat: position.coords.latitude.toFixed(6),
          lng: position.coords.longitude.toFixed(6),
          accuracy: Math.round(position.coords.accuracy)
        };
        document.getElementById('gps-box').textContent =
          '📍 GPS 已讀取\n' +
          '緯度：' + currentLocation.lat + '\n' +
          '經度：' + currentLocation.lng + '\n' +
          '精度：+/-' + currentLocation.accuracy + ' 公尺';
        setStatus('準備好了！請點擊拍照');
      },
      function(err) {
        document.getElementById('gps-box').textContent =
          '⚠️ GPS 讀取失敗\n' + err.message + '\n照片將存入「其他」資料夾';
        setStatus('無 GPS，仍可拍照');
        showDebug('GPS 錯誤 code:' + err.code + ' msg:' + err.message);
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
  }

  function openCamera() {
    document.getElementById('file-input').click();
  }

  function handleFiles(files) {
    for (var i = 0; i < files.length; i++) {
      photos.push(files[i]);
      photoLocations.push(currentLocation ? {
        lat: currentLocation.lat,
        lng: currentLocation.lng,
        accuracy: currentLocation.accuracy
      } : null);
      addPreview(files[i], photoLocations[photoLocations.length - 1]);
    }
    updateCount();
    document.getElementById('btn-upload').style.display = 'block';
    setStatus('已選取 ' + photos.length + ' 張，點擊上傳');
  }

  function addPreview(file, location) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var item = document.createElement('div');
      item.className = 'preview-item';
      var img = document.createElement('img');
      img.src = e.target.result;
      item.appendChild(img);
      if (location) {
        var tag = document.createElement('div');
        tag.className = 'gps-tag';
        tag.textContent = location.lat + ',' + location.lng;
        item.appendChild(tag);
      }
      document.getElementById('preview-area').appendChild(item);
    };
    reader.readAsDataURL(file);
  }

  function updateCount() {
    document.getElementById('count-badge').textContent = '已拍 ' + photos.length + ' 張';
  }

  function getToday() {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
  }

  async function uploadAll() {
    if (photos.length === 0) {
      setStatus('⚠️ 請先拍照');
      return;
    }
    uploadGroupCount++;
    document.getElementById('btn-upload').disabled = true;
    document.getElementById('btn-camera').disabled = true;
    document.getElementById('progress-bar').style.display = 'block';
    document.getElementById('area-box').style.display = 'none';

    var today = getToday();

    for (var i = 0; i < photos.length; i++) {
      setStatus('上傳中 ' + (i+1) + ' / ' + photos.length + ' 張...');
      var pct = Math.round(((i+1) / photos.length) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      await uploadPhoto(photos[i], i + 1, photoLocations[i], today);
    }

    setStatus('✅ 第 ' + uploadGroupCount + ' 組完成！共 ' + photos.length + ' 張');
    document.getElementById('btn-upload').style.display = 'none';
    document.getElementById('btn-upload').disabled = false;
    document.getElementById('btn-camera').disabled = false;

    photos = [];
    photoLocations = [];
    document.getElementById('preview-area').innerHTML = '';
    document.getElementById('count-badge').textContent = '已拍 0 張';

    await notifyBot('upload_done', uploadGroupCount);
  }

  async function uploadPhoto(file, index, location, today) {
    return new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = async function(e) {
        var base64 = e.target.result.split(',')[1];
        var payload = {
          action: 'upload_photo',
          userId: sessionData.userId,
          index: index,
          groupCount: uploadGroupCount,
          today: today,
          imageData: base64,
          photoLat: location ? location.lat : null,
          photoLng: location ? location.lng : null
        };
        showDebug('上傳第' + index + '張\nGPS: ' + payload.photoLat + ', ' + payload.photoLng + '\n用戶ID: ' + payload.userId);
        try {
          var response = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(payload)
          });
          var text = await response.text();
          showDebug('伺服器回應：\n' + text);
          try {
            var data = JSON.parse(text);
            if (data.areaName) {
              document.getElementById('area-box').style.display = 'block';
              document.getElementById('area-box').textContent =
                '📌 已匹配地區：' + data.areaName + '\n' +
                '📏 距離：' + data.distance + ' 公尺\n' +
                '📂 ' + data.folderName;
            } else {
              document.getElementById('area-box').style.display = 'block';
              document.getElementById('area-box').textContent =
                '📂 存入「其他」資料夾\n' + (data.folderName || '');
            }
          } catch(pe) {
            showDebug('解析回應失敗：' + pe.message + '\n原始回應：' + text);
          }
          resolve(true);
        } catch(err) {
          showDebug('上傳失敗：' + err.toString());
          setStatus('上傳失敗：' + err.message);
          resolve(false);
        }
      };
      reader.onerror = function() {
        showDebug('讀取檔案失敗');
        resolve(false);
      };
      reader.readAsDataURL(file);
    });
  }

  async function notifyBot(action, groupCount) {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: action,
          userId: sessionData.userId,
          groupCount: groupCount
        })
      });
    } catch(err) {
      showDebug('通知失敗：' + err.toString());
    }
  }

  async function endSession() {
    setStatus('結束中...');
    await notifyBot('end_session', uploadGroupCount);
    liff.closeWindow();
  }

  initLiff();
</script>
</body>
</html>
