<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE 拍照備份</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #FFF5F9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h2 { color: #D4607E; margin-bottom: 6px; font-size: 20px; }
    .subtitle { color: #999; font-size: 13px; margin-bottom: 20px; }
    .info-box {
      background: white;
      border-radius: 16px;
      padding: 14px 18px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .info-box p { font-size: 13px; color: #555; line-height: 2; }
    .info-box span { color: #D4607E; font-weight: bold; }
    .gps-box {
      background: #E8F8F0;
      border-radius: 12px;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #3A9A72;
      line-height: 1.6;
    }
    .area-box {
      background: #FFF0C0;
      border-radius: 12px;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #A07800;
      line-height: 1.6;
      display: none;
    }
    .btn {
      width: 100%;
      max-width: 400px;
      padding: 14px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.75; }
    .btn-camera { background: #FFB5C8; color: #D4607E; }
    .btn-upload { background: #C7CEEA; color: #5A65B5; display: none; }
    .btn-end    { background: #FFDAC1; color: #D07030; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .preview-area {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .preview-item {
      width: calc(33% - 6px);
      position: relative;
    }
    .preview-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 10px;
      border: 2px solid #FFB5C8;
    }
    .preview-item .gps-tag {
      position: absolute;
      bottom: 4px;
      left: 4px;
      background: rgba(0,0,0,0.55);
      color: white;
      font-size: 9px;
      border-radius: 4px;
      padding: 2px 4px;
    }
    .count-badge {
      background: #FFB5C8;
      color: #D4607E;
      border-radius: 50px;
      padding: 5px 16px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 14px;
    }
    .progress-bar {
      width: 100%;
      max-width: 400px;
      background: #eee;
      border-radius: 50px;
      height: 10px;
      margin-bottom: 12px;
      overflow: hidden;
      display: none;
    }
    .progress-fill {
      background: #FFB5C8;
      height: 100%;
      border-radius: 50px;
      transition: width 0.3s;
      width: 0%;
    }
    .status {
      color: #888;
      font-size: 12px;
      margin-top: 6px;
      text-align: center;
      min-height: 18px;
      padding: 0 10px;
    }
    #file-input { display: none; }
  </style>
</head>
<body>

<h2>📷 LINE 拍照備份</h2>
<p class="subtitle">照片將依 GPS 自動存入對應地區</p>

<div class="gps-box" id="gps-box">
  📡 正在讀取 GPS 座標...
</div>

<div class="area-box" id="area-box"></div>

<div class="count-badge" id="count-badge">已拍 0 張</div>

<div class="preview-area" id="preview-area"></div>

<div class="progress-bar" id="progress-bar">
  <div class="progress-fill" id="progress-fill"></div>
</div>

<button class="btn btn-camera" id="btn-camera" onclick="openCamera()">📷 拍照 / 選取照片</button>
<button class="btn btn-upload" id="btn-upload" onclick="uploadAll()">⬆️ 上傳全部照片</button>
<button class="btn btn-end" id="btn-end" onclick="endSession()">⏹ 結束</button>

<input type="file" id="file-input" accept="image/*" capture="environment" multiple onchange="handleFiles(this.files)">

<p class="status" id="status">等待 GPS 讀取中...</p>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwXZN5HGrN7eyj_MUsvcSmjF0OpC07JRUJsQhytiUBBU6M3axTVVViNY886MbPn5Nfvwg/exec';
  const LIFF_ID = '2009652153-mnWgVOub';

  var photos = [];
  var photoLocations = [];
  var currentLocation = null;
  var sessionData = {};
  var uploadGroupCount = 0;

  async function initLiff() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      var profile = await liff.getProfile();
      sessionData.userId = profile.userId;
      document.getElementById('status').textContent = '已登入，正在讀取 GPS...';
      startWatchingLocation();
    } catch(err) {
      document.getElementById('status').textContent = '初始化失敗：' + err.message;
    }
  }

  function startWatchingLocation() {
    if (!navigator.geolocation) {
      document.getElementById('gps-box').textContent = '⚠️ 此裝置不支援 GPS';
      document.getElementById('status').textContent = '無法讀取 GPS';
      return;
    }

    navigator.geolocation.watchPosition(
      function(position) {
        currentLocation = {
          lat: position.coords.latitude.toFixed(6),
          lng: position.coords.longitude.toFixed(6),
          accuracy: Math.round(position.coords.accuracy)
        };
        document.getElementById('gps-box').textContent =
          '📍 GPS 已讀取\n' +
          '緯度：' + currentLocation.lat + '\n' +
          '經度：' + currentLocation.lng + '\n' +
          '精度：±' + currentLocation.accuracy + ' 公尺';
        document.getElementById('status').textContent = '準備好了！請點擊拍照';
        document.getElementById('btn-camera').disabled = false;
      },
      function(err) {
        document.getElementById('gps-box').textContent = '⚠️ GPS 讀取失敗：' + err.message + '\n照片將存入一般備份資料夾';
        document.getElementById('status').textContent = '無 GPS，仍可拍照';
        document.getElementById('btn-camera').disabled = false;
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
  }

  function openCamera() {
    document.getElementById('file-input').click();
  }

  function handleFiles(files) {
    for (var i = 0; i < files.length; i++) {
      photos.push(files[i]);
      photoLocations.push(currentLocation ? {
        lat: currentLocation.lat,
        lng: currentLocation.lng,
        accuracy: currentLocation.accuracy
      } : null);
      addPreview(files[i], photoLocations[photoLocations.length - 1]);
    }
    updateCount();
    document.getElementById('btn-upload').style.display = 'block';
    document.getElementById('status').textContent = '已選取 ' + photos.length + ' 張，點擊上傳';
  }

  function addPreview(file, location) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var item = document.createElement('div');
      item.className = 'preview-item';
      var img = document.createElement('img');
      img.src = e.target.result;
      item.appendChild(img);
      if (location) {
        var tag = document.createElement('div');
        tag.className = 'gps-tag';
        tag.textContent = location.lat + ',' + location.lng;
        item.appendChild(tag);
      }
      document.getElementById('preview-area').appendChild(item);
    };
    reader.readAsDataURL(file);
  }

  function updateCount() {
    document.getElementById('count-badge').textContent = '已拍 ' + photos.length + ' 張';
  }

  async function uploadAll() {
    if (photos.length === 0) {
      document.getElementById('status').textContent = '⚠️ 請先拍照';
      return;
    }

    uploadGroupCount++;
    document.getElementById('btn-upload').disabled = true;
    document.getElementById('btn-camera').disabled = true;
    document.getElementById('progress-bar').style.display = 'block';
    document.getElementById('area-box').style.display = 'none';

    var today = new Date().toLocaleDateString('zh-TW', {
      timeZone: 'Asia/Taipei',
      year: 'numeric',
      month: '2-digit',
      day: '2-digit'
    }).replace(/\//g, '-');

    for (var i = 0; i < photos.length; i++) {
      document.getElementById('status').textContent = '上傳中 ' + (i+1) + ' / ' + photos.length + ' 張...';
      var pct = Math.round(((i+1) / photos.length) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      await uploadPhoto(photos[i], i + 1, photoLocations[i], today);
    }

    document.getElementById('status').textContent = '✅ 第 ' + uploadGroupCount + ' 組上傳完成！共 ' + photos.length + ' 張';
    document.getElementById('btn-upload').style.display = 'none';
    document.getElementById('btn-upload').disabled = false;
    document.getElementById('btn-camera').disabled = false;

    // 清空照片準備下一組
    photos = [];
    photoLocations = [];
    document.getElementById('preview-area').innerHTML = '';
    document.getElementById('count-badge').textContent = '已拍 0 張';

    await notifyBot('upload_done', uploadGroupCount);
  }

  async function uploadPhoto(file, index, location, today) {
    return new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = async function(e) {
        var base64 = e.target.result.split(',')[1];
        try {
          var result = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'upload_photo',
              userId: sessionData.userId,
              index: index,
              groupCount: uploadGroupCount,
              today: today,
              imageData: base64,
              photoLat: location ? location.lat : null,
              photoLng: location ? location.lng : null
            })
          });
          var data = await result.json();
          if (data.areaName) {
            document.getElementById('area-box').style.display = 'block';
            document.getElementById('area-box').textContent =
              '📌 已匹配地區：' + data.areaName + '\n' +
              '📏 距離：' + data.distance + ' 公尺';
          }
        } catch(err) {
          console.log('Upload error:', err);
        }
        resolve();
      };
      reader.readAsDataURL(file);
    });
  }

  async function notifyBot(action, groupCount) {
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: action,
          userId: sessionData.userId,
          groupCount: groupCount
        })
      });
    } catch(err) {
      console.log('Notify error:', err);
    }
  }

  async function endSession() {
    await notifyBot('end_session', uploadGroupCount);
    liff.closeWindow();
  }

  initLiff();
</script>
</body>
</html>
