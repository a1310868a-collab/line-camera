<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE 拍照備份</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #FFF5F9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h2 { color: #D4607E; margin-bottom: 6px; font-size: 20px; }
    .subtitle { color: #999; font-size: 13px; margin-bottom: 20px; }
    .gps-box {
      background: #E8F8F0;
      border-radius: 12px;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #3A9A72;
      line-height: 1.8;
      white-space: pre-line;
    }
    .area-box {
      background: #FFF0C0;
      border-radius: 12px;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #A07800;
      line-height: 1.8;
      display: none;
      white-space: pre-line;
    }
    .upload-queue-box {
      background: #E8F0FF;
      border-radius: 12px;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      font-size: 12px;
      color: #3A5AB5;
      line-height: 1.8;
      display: none;
      white-space: pre-line;
    }
    .debug-box {
      background: #F0F0F0;
      border-radius: 12px;
      padding: 10px 16px;
      width: 100%;
      max-width: 400px;
      margin-bottom: 14px;
      font-size: 11px;
      color: #555;
      line-height: 1.6;
      white-space: pre-line;
      word-break: break-all;
      display: none;
    }
    .btn {
      width: 100%;
      max-width: 400px;
      padding: 14px;
      border: none;
      border-radius: 50px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.75; }
    .btn-camera { background: #FFB5C8; color: #D4607E; }
    .btn-next   { background: #B5EAD7; color: #3A9A72; }
    .btn-end    { background: #FFDAC1; color: #D07030; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .preview-area {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .preview-item {
      width: calc(33% - 6px);
      position: relative;
      aspect-ratio: 1;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #FFB5C8;
      background: #f0f0f0;
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .status-tag {
      position: absolute;
      bottom: 4px;
      left: 4px;
      border-radius: 4px;
      padding: 2px 5px;
      font-size: 9px;
      font-weight: bold;
    }
    .group-tag {
      position: absolute;
      top: 4px;
      right: 4px;
      background: rgba(212,83,126,0.85);
      color: white;
      font-size: 9px;
      border-radius: 4px;
      padding: 2px 5px;
      font-weight: bold;
    }
    .tag-wait { background: rgba(255,200,0,0.85); color: #7A5000; }
    .tag-uploading { background: rgba(0,120,255,0.85); color: white; }
    .tag-done { background: rgba(0,180,80,0.85); color: white; }
    .tag-fail { background: rgba(220,0,0,0.85); color: white; }
    .count-badge {
      background: #FFB5C8;
      color: #D4607E;
      border-radius: 50px;
      padding: 5px 16px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 14px;
    }
    .upload-progress {
      width: 100%;
      max-width: 400px;
      background: #eee;
      border-radius: 50px;
      height: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .upload-fill {
      background: #B5EAD7;
      height: 100%;
      border-radius: 50px;
      transition: width 0.5s;
      width: 0%;
    }
    .status {
      color: #888;
      font-size: 12px;
      margin-top: 6px;
      text-align: center;
      min-height: 18px;
      padding: 0 10px;
      white-space: pre-line;
    }
    #file-input { display: none; }
  </style>
</head>
<body>

<h2>📷 LINE 拍照備份</h2>
<p class="subtitle">照片將依 GPS 自動存入對應地區</p>

<div class="gps-box" id="gps-box">📡 正在讀取 GPS 座標...</div>
<div class="area-box" id="area-box"></div>
<div class="upload-queue-box" id="queue-box"></div>
<div class="debug-box" id="debug-box"></div>

<div class="count-badge" id="count-badge">已拍 0 張 | 第 1 組</div>
<div class="preview-area" id="preview-area"></div>

<div class="upload-progress">
  <div class="upload-fill" id="upload-fill"></div>
</div>

<button class="btn btn-camera" id="btn-camera" onclick="openCamera()">📷 拍照 / 選取照片</button>
<button class="btn btn-next" id="btn-next" onclick="nextGroup()">➡️ 下一組</button>
<button class="btn btn-end" id="btn-end" onclick="endSession()">⏹ 結束</button>

<input type="file" id="file-input" accept="image/*" capture="environment" multiple onchange="handleFiles(this.files)">

<p class="status" id="status">等待 GPS 讀取中...</p>

<script>
  var GAS_URL = 'https://script.google.com/macros/s/AKfycbw-IIdB05JNcE6ltKy8YrTYQ17YhWMvt14UXn33mrFdIQf8LIYaf62VMI0wa04iBqGH/exec';
  var LIFF_ID = '2009652153-mnWgVOub';

  var currentLocation = null;
  var sessionData = {};
  var groupCount = 1;
  var totalPhotoCount = 0;
  var uploadQueue = [];
  var isUploading = false;
  var uploadedCount = 0;
  var failedCount = 0;
  var previewItems = [];

  function showDebug(msg) {
    var box = document.getElementById('debug-box');
    box.style.display = 'block';
    box.textContent = msg;
  }

  function setStatus(msg) {
    document.getElementById('status').textContent = msg;
  }

  function updateQueueBox() {
    var total = uploadQueue.length + uploadedCount + failedCount;
    if (total === 0) {
      document.getElementById('queue-box').style.display = 'none';
      return;
    }
    document.getElementById('queue-box').style.display = 'block';
    document.getElementById('queue-box').textContent =
      '後台上傳狀態\n' +
      '已完成：' + uploadedCount + ' 張\n' +
      '等待中：' + uploadQueue.length + ' 張' +
      (failedCount > 0 ? '\n失敗：' + failedCount + ' 張' : '');
    var pct = total > 0 ? Math.round((uploadedCount + failedCount) / total * 100) : 0;
    document.getElementById('upload-fill').style.width = pct + '%';
  }

  async function initLiff() {
    try {
      setStatus('初始化 LIFF...');
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      var profile = await liff.getProfile();
      sessionData.userId = profile.userId;
      setStatus('已登入，正在讀取 GPS...');
      startWatchingLocation();
    } catch(err) {
      setStatus('初始化失敗：' + err.message);
      showDebug('LIFF 錯誤：' + err.toString());
    }
  }

  function startWatchingLocation() {
    if (!navigator.geolocation) {
      document.getElementById('gps-box').textContent = '⚠️ 此裝置不支援 GPS\n照片將存入「其他」資料夾';
      setStatus('無 GPS，仍可拍照');
      syncGroupCount();
      return;
    }
    var synced = false;
    navigator.geolocation.watchPosition(
      function(position) {
        currentLocation = {
          lat: position.coords.latitude.toFixed(6),
          lng: position.coords.longitude.toFixed(6),
          accuracy: Math.round(position.coords.accuracy)
        };
        document.getElementById('gps-box').textContent =
          '📍 GPS 已讀取\n' +
          '緯度：' + currentLocation.lat + '\n' +
          '經度：' + currentLocation.lng + '\n' +
          '精度：+/-' + currentLocation.accuracy + ' 公尺';
        setStatus('準備好了！請點擊拍照');
        if (!synced) {
          synced = true;
          syncGroupCount();
        }
      },
      function(err) {
        document.getElementById('gps-box').textContent =
          '⚠️ GPS 讀取失敗\n' + err.message + '\n照片將存入「其他」資料夾';
        setStatus('無 GPS，仍可拍照');
        syncGroupCount();
      },
      { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
    );
  }

  async function syncGroupCount() {
    try {
      setStatus('正在讀取當日組數...');
      var today = getToday();
      var response = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'get_group_count',
          userId: sessionData.userId,
          today: today,
          photoLat: currentLocation ? currentLocation.lat : null,
          photoLng: currentLocation ? currentLocation.lng : null
        })
      });
      var text = await response.text();
      var data = JSON.parse(text);
      if (data.groupCount) {
        groupCount = data.groupCount;
        updateCount();
      }
      setStatus('準備好了！請點擊拍照');
    } catch(err) {
      setStatus('準備好了！請點擊拍照');
      showDebug('同步組數失敗：' + err.toString());
    }
  }

  function openCamera() {
    document.getElementById('file-input').click();
  }

  function getToday() {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
  }

  function handleFiles(files) {
    var today = getToday();
    var location = currentLocation ? {
      lat: currentLocation.lat,
      lng: currentLocation.lng
    } : null;

    for (var i = 0; i < files.length; i++) {
      totalPhotoCount++;
      var photoIndex = totalPhotoCount;
      var file = files[i];
      var currentGroup = groupCount;

      addPreview(file, photoIndex, currentGroup);

      uploadQueue.push({
        file: file,
        index: photoIndex,
        location: location,
        today: today,
        groupCount: currentGroup,
        previewIndex: previewItems.length - 1
      });
    }

    updateCount();
    updateQueueBox();
    setStatus('已加入 ' + files.length + ' 張\n後台自動上傳中，可繼續拍照');

    if (!isUploading) {
      processQueue();
    }

    document.getElementById('file-input').value = '';
  }

  function addPreview(file, index, group) {
    var itemIndex = previewItems.length;
    previewItems.push({index: index, status: 'wait'});

    var item = document.createElement('div');
    item.className = 'preview-item';
    item.id = 'preview-' + itemIndex;

    var tag = document.createElement('div');
    tag.className = 'status-tag tag-wait';
    tag.id = 'tag-' + itemIndex;
    tag.textContent = '讀取中';
    item.appendChild(tag);

    var groupTag = document.createElement('div');
    groupTag.className = 'group-tag';
    groupTag.textContent = '第' + group + '組';
    item.appendChild(groupTag);

    document.getElementById('preview-area').appendChild(item);

    var reader = new FileReader();
    reader.onload = function(e) {
      var img = document.createElement('img');
      img.src = e.target.result;
      item.insertBefore(img, item.firstChild);
      tag.textContent = '等待';
    };
    reader.readAsDataURL(file);
  }

  function updatePreviewTag(itemIndex, status, text) {
    var tag = document.getElementById('tag-' + itemIndex);
    if (!tag) return;
    tag.className = 'status-tag tag-' + status;
    tag.textContent = text;
  }

  function updateCount() {
    document.getElementById('count-badge').textContent =
      '已拍 ' + totalPhotoCount + ' 張 | 第 ' + groupCount + ' 組';
  }

  async function processQueue() {
    if (isUploading || uploadQueue.length === 0) return;
    isUploading = true;
    while (uploadQueue.length > 0) {
      var item = uploadQueue.shift();
      var previewIdx = item.previewIndex;
      updatePreviewTag(previewIdx, 'uploading', '上傳中');
      var success = await uploadPhoto(item);
      if (success) {
        uploadedCount++;
        updatePreviewTag(previewIdx, 'done', '完成');
      } else {
        failedCount++;
        updatePreviewTag(previewIdx, 'fail', '失敗');
      }
      updateQueueBox();
    }
    isUploading = false;
    setStatus('✅ 所有照片上傳完成！\n共 ' + uploadedCount + ' 張成功' + (failedCount > 0 ? '，' + failedCount + ' 張失敗' : ''));
  }

  async function uploadPhoto(item) {
    return new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = async function(e) {
        var base64 = e.target.result.split(',')[1];
        try {
          var response = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({
              action: 'upload_photo',
              userId: sessionData.userId,
              index: item.index,
              groupCount: item.groupCount,
              today: item.today,
              imageData: base64,
              photoLat: item.location ? item.location.lat : null,
              photoLng: item.location ? item.location.lng : null
            })
          });
          var text = await response.text();
          try {
            var data = JSON.parse(text);
            if (data.areaName) {
              document.getElementById('area-box').style.display = 'block';
              document.getElementById('area-box').textContent =
                '📌 匹配地區：' + data.areaName + '\n' +
                '📏 距離：' + data.distance + ' 公尺\n' +
                '📂 ' + data.folderName + '\n' +
                '🔢 目前組別：' + (data.currentGroup || '');
            } else if (data.folderName) {
              document.getElementById('area-box').style.display = 'block';
              document.getElementById('area-box').textContent =
                '📂 存入「其他」資料夾\n' + data.folderName + '\n' +
                '🔢 目前組別：' + (data.currentGroup || '');
            }
          } catch(pe) {
            showDebug('解析失敗：' + text);
          }
          resolve(true);
        } catch(err) {
          showDebug('上傳失敗：' + err.toString());
          resolve(false);
        }
      };
      reader.onerror = function() { resolve(false); };
      reader.readAsDataURL(item.file);
    });
  }

  function nextGroup() {
    groupCount++;
    updateCount();
    setStatus('已切換到第 ' + groupCount + ' 組\n繼續拍照，後台自動上傳');
    document.getElementById('area-box').style.display = 'none';
  }

  async function endSession() {
    setStatus('結束中...');
    try {
      await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'end_session',
          userId: sessionData.userId,
          groupCount: groupCount,
          totalCount: totalPhotoCount
        })
      });
    } catch(err) {
      showDebug('通知失敗：' + err.toString());
    }
    liff.closeWindow();
  }

  initLiff();
</script>
</body>
</html>
